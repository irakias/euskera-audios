<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f23;--panel:#1a1a3e;--border:#4a4a8a;--acc:#ffdd00;
  --green:#00ff7f;--red:#ff4444;--blue:#4488ff;--purple:#cc44ff;
  --white:#e8e8f0;--muted:#7777aa;--dark:#0a0a1a;--orange:#ff8800;
}
html,body{height:100%;overflow-x:hidden;}
body{font-family:"Press Start 2P",monospace;background:var(--bg);color:var(--white);}
#root{max-width:480px;margin:0 auto;padding:10px;min-height:100vh;padding-bottom:env(safe-area-inset-bottom);}
.screen{display:none;}.screen.active{display:block;}

/* START */
.start-wrap{text-align:center;padding:30px 10px;}
.start-logo{font-size:13px;color:var(--acc);text-shadow:3px 3px 0 #aa7700;letter-spacing:2px;margin-bottom:6px;animation:blink2 1.5s infinite;}
.start-sub{font-size:5px;color:var(--muted);letter-spacing:2px;margin-bottom:30px;}
.start-box{background:var(--panel);border:3px solid var(--border);box-shadow:5px 5px 0 var(--dark);padding:20px;margin-bottom:16px;text-align:left;}
.start-label{font-size:6px;color:var(--muted);margin-bottom:8px;letter-spacing:1px;}
.start-input{font-family:"Press Start 2P",monospace;font-size:9px;background:var(--dark);border:3px solid var(--border);color:var(--white);padding:12px 10px;width:100%;outline:none;margin-bottom:16px;}
.start-input:focus{border-color:var(--acc);}
.continue-box{background:var(--dark);border:2px solid var(--green);padding:12px;margin-bottom:12px;font-size:7px;color:var(--green);cursor:pointer;text-align:center;}
.press-start{font-size:9px;color:var(--acc);text-shadow:3px 3px 0 #aa7700;animation:blink2 .9s infinite;margin-top:10px;}
@keyframes blink2{0%,100%{opacity:1;}50%{opacity:0;}}

/* HUD */
.hud{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.hud-block{background:var(--dark);border:2px solid var(--border);padding:5px 7px;flex:1;min-width:60px;text-align:center;}
.hud-label{font-size:4px;color:var(--muted);margin-bottom:3px;letter-spacing:1px;}
.hud-val{font-size:10px;color:var(--acc);}
.hearts{font-size:12px;line-height:1;}
.xp-wrap{flex:2;min-width:110px;}
.xp-track{background:var(--dark);border:2px solid var(--border);height:10px;margin-top:3px;}
.xp-fill{height:100%;background:var(--acc);transition:width .3s;}
.hud-name{font-size:5px;color:var(--purple);text-align:right;margin-bottom:4px;}

/* NAV */
.nav-tabs{display:flex;gap:4px;margin-bottom:8px;}
.nav-tab{font-family:"Press Start 2P",monospace;background:var(--dark);border:2px solid var(--border);color:var(--muted);cursor:pointer;padding:7px 6px;font-size:5px;flex:1;text-align:center;}
.nav-tab.active{background:var(--panel);border-color:var(--acc);color:var(--acc);}

/* LEVELS */
.level-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.lvl-btn{font-family:"Press Start 2P",monospace;background:var(--dark);border:2px solid var(--border);box-shadow:3px 3px 0 #000;color:var(--muted);cursor:pointer;padding:7px 6px;font-size:5px;flex:1;min-width:50px;text-align:center;}
.lvl-btn.active{border-color:var(--acc);color:var(--acc);}
.lvl-btn.locked{opacity:.3;cursor:not-allowed;}

/* TABS */
.tab-row{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px;}
.tab-btn{font-family:"Press Start 2P",monospace;background:var(--dark);border:2px solid var(--border);color:var(--muted);cursor:pointer;padding:7px 5px;font-size:5px;flex:1;text-align:center;}
.tab-btn.active{background:var(--purple);border-color:#8822cc;color:#fff;box-shadow:3px 3px 0 #440088;}

/* PROGRESS */
.prog-track{background:var(--dark);border:2px solid var(--border);height:7px;margin-bottom:8px;}
.prog-fill{height:100%;background:var(--blue);transition:width .3s;}

/* GAME AREA */
.game-area{background:var(--panel);border:3px solid var(--border);box-shadow:4px 4px 0 var(--dark);padding:12px;}
.save-ind{font-size:4px;color:var(--muted);text-align:right;min-height:10px;margin-bottom:4px;}
.q-type{font-size:5px;color:var(--purple);margin-bottom:7px;letter-spacing:1px;}
.q-text{font-size:13px;color:var(--acc);margin-bottom:5px;line-height:1.8;word-break:break-word;}
.q-hint{font-size:5px;color:var(--muted);margin-bottom:12px;letter-spacing:.5px;}
.q-speak{background:none;border:none;font-size:16px;cursor:pointer;margin-left:6px;vertical-align:middle;padding:4px;}

/* TIMER */
.timer-row{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.timer-track{flex:1;background:var(--dark);border:2px solid var(--border);height:9px;}
.timer-fill{height:100%;background:var(--green);transition:width .1s linear;}
.timer-num{font-size:8px;color:var(--green);min-width:16px;text-align:right;}

/* OPTIONS */
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px;}
.opt-btn{font-family:"Press Start 2P",monospace;background:var(--dark);border:3px solid var(--border);box-shadow:4px 4px 0 #000;color:var(--white);cursor:pointer;padding:14px 8px;font-size:7px;line-height:1.7;text-align:center;word-break:break-word;width:100%;min-height:56px;}
.opt-btn:active:not(.disabled){transform:translate(4px,4px);box-shadow:0 0 0 #000;}
.opt-btn.correct{background:#003300;border-color:var(--green);color:var(--green);transform:translate(4px,4px);box-shadow:0 0 0;}
.opt-btn.wrong{background:#330000;border-color:var(--red);color:var(--red);transform:translate(4px,4px);box-shadow:0 0 0;}
.opt-btn.disabled{cursor:default;}

/* MATCH */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px;}
.match-col{display:flex;flex-direction:column;gap:5px;}
.match-item{font-family:"Press Start 2P",monospace;background:var(--dark);border:2px solid var(--border);box-shadow:3px 3px 0 #000;color:var(--white);cursor:pointer;padding:12px 6px;font-size:6px;text-align:center;line-height:1.6;min-height:48px;display:flex;align-items:center;justify-content:center;word-break:break-word;}
.match-item.selected{border-color:var(--acc);color:var(--acc);background:#1a1600;transform:translate(3px,3px);box-shadow:0 0 0;}
.match-item.matched{background:#003300;border-color:var(--green);color:var(--green);transform:translate(3px,3px);box-shadow:0 0 0;}
.match-item.wrong-match{border-color:var(--red);color:var(--red);}

/* FILL */
.fill-in{font-family:"Press Start 2P",monospace;font-size:8px;background:var(--dark);border:3px solid var(--border);color:var(--white);padding:12px 10px;outline:none;width:100%;margin-bottom:8px;}
.fill-in:focus{border-color:var(--acc);}
.fill-in.correct{border-color:var(--green);color:var(--green);background:#001a00;}
.fill-in.wrong{border-color:var(--red);color:var(--red);background:#1a0000;}

/* BUILD */
.word-bank{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.word-chip{font-family:"Press Start 2P",monospace;background:var(--dark);border:2px solid var(--border);box-shadow:3px 3px 0 #000;color:var(--white);cursor:pointer;padding:10px 10px;font-size:7px;}
.word-chip:active:not(.used){transform:translate(2px,2px);box-shadow:1px 1px 0 #000;}
.word-chip.used{opacity:.2;cursor:default;}
.sentence-build{background:var(--dark);border:3px dashed var(--border);min-height:50px;padding:10px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:8px;}
.placed-word{font-family:"Press Start 2P",monospace;background:var(--panel);border:2px solid var(--acc);color:var(--acc);padding:7px 9px;font-size:7px;cursor:pointer;}
.ph-text{font-size:5px;color:var(--muted);}

/* SPRINT */
.sprint-counter{font-size:32px;color:var(--acc);text-align:center;margin-bottom:4px;}
.sprint-label{font-size:5px;color:var(--muted);text-align:center;margin-bottom:12px;}
.sprint-time{font-size:22px;color:var(--green);text-align:center;margin-bottom:12px;}
.sprint-time.danger{color:var(--red);animation:blink2 .5s infinite;}

/* BUTTONS */
.px-btn{font-family:"Press Start 2P",monospace;background:var(--panel);border:3px solid var(--border);box-shadow:4px 4px 0 var(--dark);color:var(--white);cursor:pointer;padding:13px 14px;font-size:8px;line-height:1.6;width:100%;text-align:center;margin-top:6px;display:block;}
.px-btn:active{transform:translate(4px,4px);box-shadow:0 0 0;}
.px-btn.accent{background:var(--acc);color:var(--dark);border-color:#aa9900;}
.px-btn.red{background:#330000;color:var(--red);border-color:var(--red);}
.px-btn.small{font-size:6px;padding:10px 10px;}

/* FEEDBACK */
.fb-box{padding:11px;border:4px solid;margin-bottom:8px;font-size:7px;line-height:2;animation:fadeIn .15s;}
.fb-box.correct{border-color:var(--green);background:#001a00;color:var(--green);}
.fb-box.wrong{border-color:var(--red);background:#1a0000;color:var(--red);}
.fb-main{font-size:10px;margin-bottom:5px;}
.fb-sub{font-size:5px;color:var(--muted);}

/* BANNER */
.banner{text-align:center;padding:9px;font-size:7px;margin-bottom:8px;animation:fadeIn .2s;border:3px solid;}
.banner.combo{background:var(--acc);color:var(--dark);border-color:#aa9900;box-shadow:4px 4px 0 #553300;}
.banner.unlock{background:var(--blue);color:#fff;border-color:#2255aa;box-shadow:4px 4px 0 #001144;}
.banner.achieve{background:#330033;color:var(--purple);border-color:var(--purple);box-shadow:4px 4px 0 #110011;}

/* DAILY */
.daily-box{background:var(--dark);border:3px solid var(--orange);box-shadow:4px 4px 0 #552200;padding:10px;margin-bottom:8px;}
.daily-title{font-size:5px;color:var(--orange);margin-bottom:6px;letter-spacing:1px;}
.daily-desc{font-size:7px;color:var(--white);margin-bottom:6px;line-height:1.8;}
.daily-prog{background:var(--panel);border:2px solid var(--border);height:10px;margin-bottom:4px;}
.daily-prog-fill{height:100%;background:var(--orange);transition:width .3s;}
.daily-nums{font-size:5px;color:var(--muted);}
.daily-done{color:var(--green);font-size:6px;}

/* ACHIEVEMENTS */
.achieve-grid{display:flex;flex-direction:column;gap:6px;}
.achieve-item{background:var(--dark);border:2px solid var(--border);padding:10px;display:flex;align-items:center;gap:10px;}
.achieve-item.unlocked{border-color:var(--purple);}
.achieve-icon{font-size:18px;min-width:28px;text-align:center;}
.achieve-info{flex:1;}
.achieve-name{font-size:6px;color:var(--white);margin-bottom:4px;}
.achieve-desc{font-size:5px;color:var(--muted);}
.achieve-item.locked .achieve-icon{filter:grayscale(1);opacity:.3;}
.achieve-item.locked .achieve-name{color:var(--muted);}

/* CENTER */
.center-state{text-align:center;padding:28px 10px;}
.big-text{font-size:14px;margin-bottom:14px;}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}
.shake{animation:shake .35s;}
</style>
</head>

<script>
const AUDIO_BASE = 'https://irakias.github.io/euskera-audios/';
let audioCache = {};

function playAudio(filename) {
  if (!filename) return;
  const url = AUDIO_BASE + filename + '.wav';
  if (audioCache[filename]) {
    audioCache[filename].currentTime = 0;
    audioCache[filename].play().catch(()=>{});
    return;
  }
  const audio = new Audio(url);
  audioCache[filename] = audio;
  audio.play().catch(()=>{});
}

// Fallback TTS si el audio falla
function speakFallback(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const voices = window.speechSynthesis.getVoices();
  const eu = voices.find(v => v.lang && v.lang.startsWith('eu'));
  const es = voices.find(v => v.lang && v.lang.startsWith('es'));
  u.voice = eu || es || null;
  u.lang = eu ? 'eu-ES' : 'es-ES';
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

function speak(filename, text) {
  if (filename) {
    const url = AUDIO_BASE + filename + '.wav';
    const audio = new Audio(url);
    audio.onerror = () => speakFallback(text);
    audio.play().catch(() => speakFallback(text));
  } else {
    speakFallback(text);
  }
}

// ── AUDIO ENGINE (8-bit SFX) ──
let AC = null;
function getAC(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
function beep(freq,dur,type,vol,delay){
  type=type||'square';vol=vol||0.15;delay=delay||0;
  const ac=getAC();if(!ac)return;
  try{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
  o.type=type;o.frequency.setValueAtTime(freq,ac.currentTime+delay);
  g.gain.setValueAtTime(vol,ac.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+delay+dur);
  o.start(ac.currentTime+delay);o.stop(ac.currentTime+delay+dur+0.05);}catch(e){}}
function sfxCorrect(){beep(523,.07);beep(659,.07,null,null,.08);beep(784,.14,null,null,.16);}
function sfxWrong(){beep(200,.06,'sawtooth',.2);beep(140,.14,'sawtooth',.2,.07);}
function sfxCombo(){[523,659,784,1047].forEach((f,i)=>beep(f,.1,'square',.18,i*.1));}
function sfxUnlock(){[330,392,494,587,698,784].forEach((f,i)=>beep(f,.1,'square',.15,i*.11));}
function sfxGameover(){[300,250,200,150].forEach((f,i)=>beep(f,.18,'sawtooth',.22,i*.2));}
function sfxTimer(){beep(880,.05,'square',.09);}
function sfxAchieve(){[784,988,1175].forEach((f,i)=>beep(f,.12,'square',.2,i*.13));}
function sfxStart(){[262,330,392,523].forEach((f,i)=>beep(f,.13,'square',.2,i*.13));}

function speakBtn(filename, text) {
  return `<button class="q-speak" onclick="speak('${esc(filename)}','${esc(text)}')" title="Escuchar">🔊</button>`;
}

// ── STORAGE ──
const SAVE_KEY = 'euskera-v3-save';
async function saveGame(silent) {
  try {
    const data = {
      xp:S.xp,score:S.score,correct:S.correct,lives:S.lives,maxStreak:S.maxStreak,
      levelsUnlocked:S.levelsUnlocked,bestSprint:S.bestSprint,perfectMatches:S.perfectMatches,
      dailiesCompleted:S.dailiesCompleted,achievements:S.achievements,
      currentLevel:S.currentLevel,currentGame:S.currentGame,
      playerName:S.playerName,dailyDate:S.dailyDate,dailyDone:S.dailyDone,dailyProgress:S.dailyProgress,
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    if (!silent) showSaveInd('💾 GUARDADO');
  } catch(e) { if (!silent) showSaveInd('! ERROR'); }
}
function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) { Object.assign(S, JSON.parse(raw)); return true; }
  } catch(e) {}
  return false;
}
function deleteSave() { localStorage.removeItem(SAVE_KEY); }
function showSaveInd(msg) {
  const el = document.getElementById('save-ind');
  if (el) { el.textContent = msg; setTimeout(() => { if(el) el.textContent=''; }, 2000); }
}

// ── INIT ──
function initStart() {
  const hasSave = loadSave();
  const ca = document.getElementById('continue-area');
  if (hasSave && S.playerName && ca) {
    ca.innerHTML = `<div class="continue-box" onclick="startGame(true)">
      ▶ CONTINUAR COMO ${S.playerName}<br>
      <span style="font-size:5px;color:var(--muted)">XP: ${S.xp} · SCORE: ${S.score}</span>
    </div>`;
  }
  if (window.speechSynthesis) window.speechSynthesis.getVoices();
}

function startGame(cont) {
  getAC();
  if (!cont) {
    const name = ((document.getElementById('name-input')||{}).value||'JUGADOR').trim().toUpperCase().substring(0,12)||'JUGADOR';
    S = {xp:0,score:0,correct:0,lives:3,maxStreak:0,levelsUnlocked:1,bestSprint:0,perfectMatches:0,
      dailiesCompleted:0,achievements:[],currentLevel:1,currentGame:'translate',playerName:name,
      dailyDate:'',dailyDone:false,dailyProgress:0,streak:0,questionIndex:0,answered:false,
      timer:null,timeLeft:15,matchSel:null,matchedPairs:new Set(),matchPairs:[],matchErrors:0,
      placedWords:[],_buildSent:null,sprintTimer:null,sprintActive:false,_sprintSecs:60,sprintScore:0,
      sessionCorrect:0,sessionXP:0,levelsPlayed:new Set(),modesPlayed:new Set(),matchRounds:0};
  } else {
    S.matchedPairs=new Set();S.levelsPlayed=new Set();S.modesPlayed=new Set();
    S.sessionCorrect=0;S.sessionXP=0;S.matchRounds=0;
  }
  sfxStart();
  document.getElementById('screen-start').classList.remove('active');
  document.getElementById('screen-game').classList.add('active');
  const hn = document.getElementById('hud-name'); if(hn) hn.textContent = '▶ '+S.playerName;
  renderLevels(); renderTabs(); renderHUD(); checkDailyReset(); loadQuestion(); saveGame(true);
}

function goToStart() {
  clearTimer(); clearSprint();
  document.getElementById('screen-game').classList.remove('active');
  document.getElementById('screen-start').classList.add('active');
  initStart();
}

function confirmReset() {
  if (confirm('¿Borrar partida? Se perderá todo el progreso.')) {
    deleteSave(); S.playerName=''; S.xp=0; S.score=0; goToStart();
  }
}

// ── NAV ──
function showNav(tab) {
  ['play','daily','achieve','menu'].forEach(t => {
    const el = document.getElementById('tab-'+t); if(el) el.style.display = t===tab?'block':'none';
    const nb = document.getElementById('nav-'+t); if(nb) nb.classList.toggle('active', t===tab);
  });
  if (tab==='daily') renderDaily();
  if (tab==='achieve') renderAchievements();
  if (tab!=='play') { clearTimer(); clearSprint(); }
}

// ── HUD ──
function getUnlocked() { return LEVELS.map(l=>({...l,unlocked:l.id===1||S.xp>=l.xpNeeded})); }
function xpForNext() { const n=LEVELS.find(l=>l.id===S.currentLevel+1); return n?n.xpNeeded:99999; }
function xpForCurrent() { return LEVELS.find(l=>l.id===S.currentLevel)?.xpNeeded||0; }
function setEl(id,val) { const e=document.getElementById(id); if(e) e.textContent=val; }

function renderHUD() {
  const lv = Math.max(0,S.lives);
  const hEl = document.getElementById('h-hearts');
  if (hEl) { hEl.textContent='♥'.repeat(lv)+'♡'.repeat(Math.max(0,3-lv)); hEl.style.color=lv<=1?'#ff4444':lv===2?'#ffaa00':'#ff6688'; }
  setEl('h-score',S.score); setEl('h-streak',S.streak); setEl('h-xp',S.xp);
  const nxp=xpForNext(),prevXp=xpForCurrent();
  setEl('h-xpnext',nxp===99999?'MAX':nxp);
  const pct=nxp===99999?100:Math.min(100,Math.round(((S.xp-prevXp)/Math.max(1,nxp-prevXp))*100));
  const bar=document.getElementById('h-xpbar'); if(bar) bar.style.width=pct+'%';
}

function renderLevels() {
  const lvls = getUnlocked();
  const el = document.getElementById('level-btns'); if(!el) return;
  el.innerHTML = lvls.map(l=>`<button class="lvl-btn ${l.id===S.currentLevel?'active':''} ${!l.unlocked?'locked':''}"
    onclick="${l.unlocked?`selectLevel(${l.id})`:`showLock(${l.xpNeeded})`}">${l.label}${!l.unlocked?' 🔒':''}</button>`).join('');
}

function renderTabs() {
  const el = document.getElementById('game-tabs'); if(!el) return;
  el.innerHTML = GAME_TYPES.map(g=>`<button class="tab-btn ${g.id===S.currentGame?'active':''}" onclick="selectGame('${g.id}')">${g.label}</button>`).join('');
}

function selectLevel(id) {
  S.currentLevel=id; S.questionIndex=0; S.answered=false; S.levelsPlayed.add(id);
  renderLevels(); renderHUD(); loadQuestion(); updateDailyStat('levelsPlayed',S.levelsPlayed.size);
}
function selectGame(g) {
  S.currentGame=g; S.questionIndex=0; S.answered=false; S.modesPlayed.add(g);
  renderTabs(); clearTimer(); clearSprint(); loadQuestion(); updateDailyStat('modesPlayed',S.modesPlayed.size);
}
function showLock(xp) {
  document.getElementById('game-content').innerHTML=`<div class="center-state">
    <div style="font-size:24px;margin-bottom:10px">🔒</div>
    <div style="font-size:7px;margin-bottom:7px">BLOQUEADO</div>
    <div style="color:var(--acc);font-size:6px">NECESITAS ${xp} XP</div>
    <div style="color:var(--muted);font-size:5px;margin-top:5px">TIENES ${S.xp} XP</div>
  </div>`;
}
function updateProg() { const pct=((S.questionIndex%10)/10)*100; const el=document.getElementById('prog-bar'); if(el) el.style.width=pct+'%'; }

// ── QUESTION ──
function shuffle(a) { return [...a].sort(()=>Math.random()-.5); }
function getQ() { const p=C[S.currentLevel].pairs; return p[S.questionIndex%p.length]; }

function loadQuestion() {
  clearTimer(); clearSprint();
  S.answered=false; S.matchSel=null; S.matchedPairs=new Set(); S.matchErrors=0; S.placedWords=[];
  const gc = document.getElementById('game-content'); if(!gc) return;
  const q = getQ();
  if (S.currentGame==='translate') renderTranslate(q,gc);
  else if (S.currentGame==='match') renderMatch(gc);
  else if (S.currentGame==='fill') renderFill(q,gc);
  else if (S.currentGame==='build') renderBuild(gc);
  else if (S.currentGame==='sprint') renderSprint(gc);
  else renderEntzun(q,gc);
  updateProg();
}

// ── TRANSLATE ──
function renderTranslate(q,gc) {
  const dir = Math.random()>.5?'eu':'es';
  const question=dir==='eu'?q.eu:q.es, answer=dir==='eu'?q.es:q.eu;
  const dist = shuffle(C[S.currentLevel].pairs.filter(p=>p!==q)).slice(0,3).map(p=>dir==='eu'?p.es:p.eu);
  const opts = shuffle([answer,...dist]);
  gc.innerHTML=`<div class="q-type">★ ${dir==='eu'?'EUSKERA → ESPAÑOL':'ESPAÑOL → EUSKERA'}</div>
  <div class="timer-row"><div class="timer-track"><div class="timer-fill" id="tf" style="width:100%"></div></div><span class="timer-num" id="tn">15</span></div>
  <div class="q-text">${question}${dir==='eu'?speakBtn(q.a,q.eu):''}</div>
  <div class="q-hint">[${q.h}]</div>
  <div class="options-grid">${opts.map(o=>`<button class="opt-btn" onclick="checkTr(this,'${esc(o)}','${esc(answer)}','${esc(q.eu)}','${esc(q.es)}','${esc(q.a)}')">${o}</button>`).join('')}</div>
  <div id="fb"></div><button id="nb" class="px-btn accent" style="display:none" onclick="nextQ()">▶ SIGUIENTE</button>`;
  startTimer(15,()=>checkTr(null,'__t__',answer,q.eu,q.es,q.a));
}
function checkTr(btn,chosen,answer,eu,es,audio) {
  if(S.answered)return; clearTimer(); S.answered=true;
  const ok=chosen===answer;
  if(ok) playAudio(audio);
  document.querySelectorAll('.opt-btn').forEach(o=>{
    o.classList.add('disabled');
    if(o.textContent.trim()===answer) o.classList.add('correct');
    else if(btn&&o===btn&&!ok) o.classList.add('wrong');
  });
  showFB(ok,eu,es); updateScore(ok); if(!ok) doShake();
}

// ── FILL ──
function renderFill(q,gc) {
  const dir=Math.random()>.5?'eu':'es';
  const question=dir==='eu'?q.eu:q.es, answer=dir==='eu'?q.es:q.eu;
  gc.innerHTML=`<div class="q-type">★ ${dir==='eu'?'EUSKERA → ESPAÑOL':'ESPAÑOL → EUSKERA'}</div>
  <div class="q-text">${question}${dir==='eu'?speakBtn(q.a,q.eu):''}</div>
  <div class="q-hint">[${q.h}]</div>
  <input class="fill-in" id="fi" type="text" placeholder="ESCRIBE AQUI..." autocomplete="off" autocorrect="off" autocapitalize="off"/>
  <button class="px-btn" onclick="checkFill('${esc(answer)}','${esc(q.eu)}','${esc(q.es)}','${esc(q.a)}')">▶ COMPROBAR</button>
  <div id="fb"></div><button id="nb" class="px-btn accent" style="display:none" onclick="nextQ()">▶ SIGUIENTE</button>`;
  const fi=document.getElementById('fi');
  if(fi) fi.addEventListener('keydown',e=>{if(e.key==='Enter')checkFill(answer,q.eu,q.es,q.a);});
}
function checkFill(answer,eu,es,audio) {
  if(S.answered)return; S.answered=true;
  const fi=document.getElementById('fi'); if(!fi)return;
  const val=(fi.value||'').trim().toLowerCase();
  const ok=val===answer.toLowerCase()||similarity(val,answer.toLowerCase())>.78;
  if(ok) playAudio(audio);
  fi.classList.add(ok?'correct':'wrong'); fi.disabled=true;
  showFB(ok,eu,es,ok?null:'RESP: '+answer); updateScore(ok); if(!ok) doShake();
}

// ── MATCH ──
function renderMatch(gc) {
  const pairs=shuffle(C[S.currentLevel].pairs).slice(0,5);
  S.matchPairs=pairs; S.matchErrors=0;
  const left=shuffle(pairs.map(p=>p.eu)), right=shuffle(pairs.map(p=>p.es));
  gc.innerHTML=`<div class="q-type">★ CONECTA EUSKERA ↔ ESPAÑOL</div>
  <div style="font-size:5px;color:var(--muted);margin-bottom:8px">TOCA UNA DE CADA COLUMNA</div>
  <div class="match-grid">
    <div class="match-col">${left.map((w,i)=>{const p=pairs.find(p=>p.eu===w);return`<div class="match-item" id="ml${i}" onclick="selMatch('left','${esc(w)}','ml${i}')">${w} ${speakBtn(p?p.a:'',w)}</div>`;}).join('')}</div>
    <div class="match-col">${right.map((w,i)=>`<div class="match-item" id="mr${i}" onclick="selMatch('right','${esc(w)}','mr${i}')">${w}</div>`).join('')}</div>
  </div>
  <div id="fb"></div><button id="nb" class="px-btn accent" style="display:none" onclick="nextQ()">▶ SIGUIENTE</button>`;
}
function selMatch(side,word,elId) {
  const el=document.getElementById(elId); if(!el||el.classList.contains('matched'))return;
  if(!S.matchSel){S.matchSel={side,word,elId};el.classList.add('selected');}
  else{
    if(S.matchSel.elId===elId){el.classList.remove('selected');S.matchSel=null;return;}
    if(S.matchSel.side===side){document.getElementById(S.matchSel.elId)?.classList.remove('selected');S.matchSel={side,word,elId};el.classList.add('selected');return;}
    const euW=side==='left'?word:S.matchSel.word, esW=side==='right'?word:S.matchSel.word;
    const pair=S.matchPairs.find(p=>p.eu===euW&&p.es===esW);
    const prev=document.getElementById(S.matchSel.elId);
    if(pair){
      el.classList.remove('selected');el.classList.add('matched');prev?.classList.remove('selected');prev?.classList.add('matched');
      S.matchedPairs.add(euW); sfxCorrect(); playAudio(pair.a);
      if(S.matchedPairs.size===S.matchPairs.length){
        S.matchRounds++; updateDailyStat('matchRounds',S.matchRounds);
        if(S.matchErrors===0){S.perfectMatches++;showBanner('★ PERFEKTUA! SIN ERRORES ★','achieve');sfxAchieve();}
        setTimeout(()=>{showFB(true,'','');updateScore(true);},250);
      }
    } else {
      el.classList.add('wrong-match');prev?.classList.add('wrong-match');
      setTimeout(()=>{el.classList.remove('wrong-match','selected');prev?.classList.remove('wrong-match','selected');},500);
      sfxWrong(); S.matchErrors++; S.streak=Math.max(0,S.streak-1); renderHUD();
    }
    S.matchSel=null;
  }
}

// ── BUILD ──
function renderBuild(gc) {
  const sents=C[S.currentLevel].sentences;
  const sent=sents[Math.floor(Math.random()*sents.length)];
  S._buildSent=sent; S.placedWords=[];
  const words=shuffle(sent.eu);
  gc.innerHTML=`<div class="q-type">★ ORDENA LAS PALABRAS EN EUSKERA</div>
  <div class="q-text" style="font-size:9px;color:var(--muted)">"${sent.es}"</div>
  <div style="height:8px"></div>
  <div class="sentence-build" id="sb"><span class="ph-text" id="ph">TOCA EN ORDEN...</span></div>
  <div class="word-bank" id="wb">${words.map((w,i)=>`<div class="word-chip" id="wc${i}" onclick="placeWord('${esc(w)}',${i})">${w}</div>`).join('')}</div>
  <button class="px-btn" onclick="checkBuild()">▶ COMPROBAR</button>
  <div id="fb"></div><button id="nb" class="px-btn accent" style="display:none" onclick="nextQ()">▶ SIGUIENTE</button>`;
}
function placeWord(word,idx) {
  const chip=document.getElementById('wc'+idx); if(!chip||chip.classList.contains('used'))return;
  chip.classList.add('used'); S.placedWords.push({word,idx});
  const sb=document.getElementById('sb'); const ph=document.getElementById('ph'); if(ph)ph.remove();
  const span=document.createElement('div'); span.className='placed-word'; span.textContent=word;
  span.onclick=e=>{e.stopPropagation();removePlaced(idx,span);}; sb.appendChild(span);
}
function removePlaced(idx,span) {
  S.placedWords=S.placedWords.filter(w=>w.idx!==idx);
  document.getElementById('wc'+idx)?.classList.remove('used'); span.remove();
  const sb=document.getElementById('sb');
  if(!sb.querySelector('.placed-word')){const ph=document.createElement('span');ph.className='ph-text';ph.id='ph';ph.textContent='TOCA EN ORDEN...';sb.appendChild(ph);}
}
function checkBuild() {
  if(S.answered)return; S.answered=true;
  const expected=S._buildSent.eu, placed=(S.placedWords||[]).map(w=>w.word);
  const ok=JSON.stringify(placed)===JSON.stringify(expected);
  if(ok) playAudio(S._buildSent.a);
  showFB(ok,expected.join(' '),S._buildSent.es,ok?null:'ORDEN: '+expected.join(' '));
  updateScore(ok); if(!ok) doShake();
}

// ── SPRINT ──
function renderSprint(gc) {
  S.sprintScore=0; S.sprintActive=true; S._sprintSecs=60;
  gc.innerHTML=`<div class="q-type">★ SPRINT — 60 SEGUNDOS</div>
  <div class="sprint-time" id="sprint-time">60</div>
  <div class="sprint-counter" id="sprint-count">0</div>
  <div class="sprint-label">ACIERTOS</div>
  <div id="sprint-q"></div>`;
  nextSprintQ();
  S.sprintTimer=setInterval(()=>{
    S._sprintSecs--;
    const te=document.getElementById('sprint-time');
    if(te){te.textContent=S._sprintSecs;te.className='sprint-time'+(S._sprintSecs<=10?' danger':'');}
    if(S._sprintSecs<=10) sfxTimer();
    if(S._sprintSecs<=0){clearSprint();sprintEnd();}
  },1000);
}
function nextSprintQ() {
  const pairs=C[S.currentLevel].pairs;
  const q=pairs[Math.floor(Math.random()*pairs.length)];
  const dir=Math.random()>.5?'eu':'es';
  const question=dir==='eu'?q.eu:q.es, answer=dir==='eu'?q.es:q.eu;
  const dist=shuffle(pairs.filter(p=>p!==q)).slice(0,3).map(p=>dir==='eu'?p.es:p.eu);
  const opts=shuffle([answer,...dist]);
  const sq=document.getElementById('sprint-q'); if(!sq)return;
  sq.innerHTML=`<div class="q-text" style="font-size:11px">${question}${dir==='eu'?speakBtn(q.a,q.eu):''}</div>
  <div class="options-grid">${opts.map(o=>`<button class="opt-btn" onclick="checkSprint(this,'${esc(o)}','${esc(answer)}','${esc(q.a)}')">${o}</button>`).join('')}</div>`;
}
function checkSprint(btn,chosen,answer,audio) {
  if(!S.sprintActive)return;
  const ok=chosen===answer;
  document.querySelectorAll('#sprint-q .opt-btn').forEach(o=>{
    o.classList.add('disabled');
    if(o.textContent.trim()===answer) o.classList.add('correct');
    else if(o===btn&&!ok) o.classList.add('wrong');
  });
  if(ok){
    sfxCorrect(); playAudio(audio); S.sprintScore++; S.correct++; S.streak++; S.sessionCorrect++;
    S.xp+=8; S.score+=80; S.sessionXP+=8;
    if(S.streak>S.maxStreak) S.maxStreak=S.streak;
    const sc=document.getElementById('sprint-count'); if(sc) sc.textContent=S.sprintScore;
    renderHUD(); checkAchievements();
  } else { sfxWrong(); S.streak=0; doShake(); renderHUD(); }
  setTimeout(nextSprintQ, ok?550:850);
}
function sprintEnd() {
  S.sprintActive=false;
  if(S.sprintScore>S.bestSprint) S.bestSprint=S.sprintScore;
  updateDailyStat('sprintScore',S.sprintScore); checkAchievements(); sfxGameover();
  const gc=document.getElementById('game-content');
  if(gc) gc.innerHTML=`<div class="center-state">
    <div class="big-text" style="color:var(--acc)">SPRINT!</div>
    <div style="font-size:14px;color:var(--green);margin-bottom:8px">${S.sprintScore} ACIERTOS</div>
    <div style="font-size:6px;color:var(--muted);margin-bottom:16px">RECORD: ${S.bestSprint}</div>
    ${S.sprintScore>=10?'<div style="color:var(--purple);font-size:7px;margin-bottom:12px">★ SPRINT TXAPELDUN! ★</div>':''}
    <button class="px-btn accent" onclick="loadQuestion()">▶ JUGAR DE NUEVO</button>
  </div>`;
  saveGame(true);
}
function clearSprint(){if(S.sprintTimer){clearInterval(S.sprintTimer);S.sprintTimer=null;}S.sprintActive=false;}

// ── ENTZUN ──
function renderEntzun(q,gc) {
  const pairs=C[S.currentLevel].pairs;

  const opts=shuffle([q,...dist]);

  <div class="timer-row"><div class="timer-track"><div class="timer-fill" id="tf" style="width:100%"></div></div><span class="timer-num" id="tn">15</span></div>

}
function checkEntzun(btn,chosen,answer,eu,es,audio) {
  if(S.answered)return; clearTimer(); S.answered=true;

// ── SCORE & FEEDBACK ──
function getXpGain(){return 10+(S.streak>=3?5:0)+(S.streak>=6?5:0);}
function showFB(ok,eu,es,extra){
  const fb=document.getElementById('fb');if(!fb)return;
  fb.innerHTML=`<div class="fb-box ${ok?'correct':'wrong'}">
    <div class="fb-main">${ok?'★ ZUZEN! +'+getXpGain()+' XP':'✗ OKER!'}</div>
    ${extra?`<div class="fb-sub">${extra}</div>`:''}
    ${eu&&es&&!ok?`<div class="fb-sub" style="margin-top:3px">${eu} = ${es}</div>`:''}
  </div>`;
  const nb=document.getElementById('nb');if(nb)nb.style.display='block';
}
function updateScore(ok){
  if(ok){
    const gain=getXpGain();S.xp+=gain;S.score+=gain*10;S.correct++;S.streak++;S.sessionCorrect++;S.sessionXP+=gain;
    if(S.streak>S.maxStreak)S.maxStreak=S.streak;
    sfxCorrect();checkUnlocks();checkAchievements();
    if(S.streak===3||S.streak===5||S.streak===10){sfxCombo();showBanner('★ '+S.streak+'x COMBO! BONUS XP ★','combo');}
    updateDailyStat('streak',S.streak);updateDailyStat('sessionCorrect',S.sessionCorrect);updateDailyStat('sessionXP',S.sessionXP);
  } else {
    sfxWrong();S.streak=0;S.lives=Math.max(0,S.lives-1);
    if(S.lives===0){sfxGameover();setTimeout(gameOver,800);}
  }
  renderHUD();saveGame(true);
}
function checkUnlocks(){
  LEVELS.forEach(l=>{if(l.id>1&&S.xp>=l.xpNeeded&&l.id>S.levelsUnlocked){
    S.levelsUnlocked=l.id;sfxUnlock();showBanner('★ '+l.label+' DESBLOQUEADO: '+l.name+' ★','unlock');renderLevels();
  }});
}
function gameOver(){sfxGameover();
  const gc=document.getElementById('game-content');if(!gc)return;
  gc.innerHTML=`<div class="center-state">
    <div class="big-text" style="color:var(--red)">GAME OVER</div>
    <div style="color:var(--acc);font-size:10px;margin-bottom:7px">SCORE: ${S.score}</div>
    <div style="color:var(--muted);font-size:5px;margin-bottom:16px">ACIERTOS: ${S.correct} · XP: ${S.xp}</div>
    <button class="px-btn accent" onclick="resetLives()">▶ CONTINUAR</button>
  </div>`;}
function resetLives(){S.lives=3;S.streak=0;saveGame(true);renderHUD();loadQuestion();}
function nextQ(){S.questionIndex++;loadQuestion();}
function doShake(){const ga=document.getElementById('game-content');if(!ga)return;ga.classList.add('shake');setTimeout(()=>ga.classList.remove('shake'),380);}
function showBanner(txt,cls){
  const b=document.createElement('div');b.className='banner '+cls;b.textContent=txt;
  const gc=document.getElementById('game-content');if(!gc)return;
  gc.insertBefore(b,gc.firstChild);setTimeout(()=>{try{b.remove();}catch(e){}},2200);
}

// ── TIMER ──
function startTimer(secs,onEnd){
  S.timeLeft=secs;
  S.timer=setInterval(()=>{
    S.timeLeft--;
    const tf=document.getElementById('tf'),tn=document.getElementById('tn');
    if(tf)tf.style.width=(S.timeLeft/secs*100)+'%';if(tn)tn.textContent=S.timeLeft;
    if(S.timeLeft<=5){if(tf)tf.style.background='var(--red)';if(tn)tn.style.color='var(--red)';sfxTimer();}
    if(S.timeLeft<=0){clearTimer();if(!S.answered)onEnd();}
  },1000);
}
function clearTimer(){if(S.timer){clearInterval(S.timer);S.timer=null;}}

// ── DAILY ──
function getTodayKey(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;}
function getDailyChallenge(){return DAILIES[new Date().getDay()%DAILIES.length];}
function checkDailyReset(){const t=getTodayKey();if(S.dailyDate!==t){S.dailyDate=t;S.dailyDone=false;S.dailyProgress=0;}}
function updateDailyStat(stat,val){
  const ch=getDailyChallenge();if(S.dailyDone)return;
  if(ch.stat===stat){
    S.dailyProgress=Math.max(S.dailyProgress||0,val);
    if(S.dailyProgress>=ch.target){S.dailyDone=true;S.dailiesCompleted++;sfxAchieve();showBanner('★ ERRONKA OSATUTA! RETO DIARIO ★','achieve');checkAchievements();saveGame(true);}
  }
}
function renderDaily(){
  const ch=getDailyChallenge(),prog=Math.min(S.dailyProgress||0,ch.target),pct=Math.round((prog/ch.target)*100);
  const dc=document.getElementById('daily-content');if(!dc)return;
  const dn=['DOM','LUN','MAR','MIE','JUE','VIE','SAB'],today=dn[new Date().getDay()];
  dc.innerHTML=`<div class="daily-box">
    <div class="daily-title">★ RETO DEL DIA — ${today}</div>
    <div class="daily-desc">${ch.desc}</div>
    ${S.dailyDone?'<div class="daily-done">✓ COMPLETADO — ONGI EGINA!</div>':`<div class="daily-prog"><div class="daily-prog-fill" style="width:${pct}%"></div></div><div class="daily-nums">${prog} / ${ch.target}</div>`}
  </div>
  <div style="font-size:5px;color:var(--muted);margin-bottom:8px;letter-spacing:1px;">SEMANA COMPLETA:</div>
  ${DAILIES.map((d,i)=>`<div style="background:var(--dark);border:2px solid ${i===new Date().getDay()%DAILIES.length?'var(--orange)':'var(--border)'};padding:7px;margin-bottom:5px;font-size:5px;color:var(--muted)">${dn[i]}: ${d.desc}</div>`).join('')}`;
}

// ── ACHIEVEMENTS ──
function checkAchievements(){
  ACHIEVEMENTS.forEach(a=>{
    if(!S.achievements.includes(a.id)&&a.check(S)){
      S.achievements.push(a.id);sfxAchieve();showBanner('★ LORPEN BERRIA: '+a.name+' '+a.icon,'achieve');saveGame(true);
    }
  });
}
function renderAchievements(){
  const al=document.getElementById('achieve-list');if(!al)return;
  al.innerHTML=ACHIEVEMENTS.map(a=>{const u=S.achievements.includes(a.id);
    return`<div class="achieve-item ${u?'unlocked':'locked'}">
      <div class="achieve-icon">${a.icon}</div>
      <div class="achieve-info"><div class="achieve-name">${a.name}</div><div class="achieve-desc">${a.desc}</div></div>
      ${u?'<div style="font-size:10px;color:var(--green)">✓</div>':''}
    </div>`;}).join('');
}

// ── HELPERS ──
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function similarity(a,b){
  if(a===b)return 1;const l=a.length>b.length?a:b,sh=a.length>b.length?b:a;if(!l.length)return 1;
  const d=Array.from({length:l.length+1},(_,i)=>Array.from({length:sh.length+1},(_,j)=>j===0?i:i===0?j:0));
  for(let i=1;i<=l.length;i++)for(let j=1;j<=sh.length;j++)d[i][j]=l[i-1]===sh[j-1]?d[i-1][j-1]:1+Math.min(d[i-1][j],d[i][j-1],d[i-1][j-1]);
  return(l.length-d[l.length][sh.length])/l.length;
}

// ── START ──
if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
initStart();
</script>
